<svg xmlns="http://www.w3.org/2000/svg" width="84" height="83" viewBox="0 0 84 83" fill="none">
  <style>
    /* Emblem mark only. Shapes/colours/coords are identical to the static logo;
       motion is layered on top. Resting frame == original logo. */

    :root,
    svg {
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);   /* strong, responsive */
      --ease-wave: cubic-bezier(0.45, 0, 0.55, 1);  /* smooth in-out for the ripple */
    }

    .cat-ripple,
    .cat-base {
      transform-box: view-box;
      transform-origin: 42px 41.5px;   /* true emblem centre — keeps arcs concentric while scaling */
    }

    /* ── 1. Entrance: arcs settle in, inner → outer, then the ripple takes over ── */
    .cat-ripple {
      opacity: 0;
      animation:
        catEnter 0.7s var(--ease-out) forwards,
        catWave 3.2s var(--ease-wave) infinite;
    }
    .cat-ripple.r1 { animation-delay: 0.00s, 1.0s; }  /* innermost leads */
    .cat-ripple.r2 { animation-delay: 0.09s, 1.2s; }
    .cat-ripple.r3 { animation-delay: 0.18s, 1.4s; }
    .cat-ripple.r4 { animation-delay: 0.27s, 1.6s; }  /* outermost trails — wave travels out */

    @keyframes catEnter {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Brightness + a hair of scale that travels outward through the rings.
       Never animates from nothing — stays a teal arc the whole time. */
    @keyframes catWave {
      0%, 100% { opacity: 1;    transform: scale(1); }
      45%      { opacity: 0.55; transform: scale(0.985); }
    }

    /* ── 2. Grey base petals rise to anchor the mark ── */
    .cat-base {
      opacity: 0;
      animation: catBase 0.6s var(--ease-out) forwards;
    }
    .cat-base.b1 { animation-delay: 0.36s; }
    .cat-base.b2 { animation-delay: 0.44s; }

    @keyframes catBase {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Accessibility: static mark, no movement ── */
    @media (prefers-reduced-motion: reduce) {
      .cat-ripple, .cat-base {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>

